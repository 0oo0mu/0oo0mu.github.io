<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대시보드</title>
  <style>
    :root {
      --bg: #0c0c0c;
      --surface: #141414;
      --surface2: #1c1c1c;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #666;
      --accent: #4f8ef7;
      --green: #3ecf8e;
      --yellow: #f0b72f;
      --radius: 10px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      padding: 32px 24px 60px;
    }
    a { color: inherit; text-decoration: none; }

    .wrapper { max-width: 960px; margin: 0 auto; }

    /* 헤더 */
    .top-bar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .greeting { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
    .title { font-size: 26px; font-weight: 700; letter-spacing: -.5px; }
    .clock-block { text-align: right; }
    #clock { font-family: var(--mono); font-size: 22px; font-weight: 600; color: var(--accent); }
    #date-str { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* 섹션 */
    .section { margin-bottom: 36px; }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* 링크 카드 */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }
    .link-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 18px;
      transition: border-color .15s, background .15s, transform .12s;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }
    .link-card:hover {
      border-color: var(--accent);
      background: var(--surface2);
      transform: translateY(-2px);
    }
    .link-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--card-color, var(--accent));
      opacity: 0;
      transition: opacity .15s;
    }
    .link-card:hover::before { opacity: 1; }
    .link-card .icon { font-size: 22px; line-height: 1; }
    .link-card .name { font-size: 14px; font-weight: 600; }
    .link-card .desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .link-card .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      align-self: flex-start;
      margin-top: auto;
    }
    .badge-live { background: rgba(62,207,142,.15); color: var(--green); }
    .badge-soon { background: rgba(102,102,102,.15); color: var(--muted); }

    .c-blue   { --card-color: #4f8ef7; }
    .c-green  { --card-color: #3ecf8e; }
    .c-purple { --card-color: #a78bfa; }
    .c-muted  { --card-color: #666; }

    .footer { text-align: center; font-size: 11px; color: #333; margin-top: 48px; }
  </style>
</head>
<body>
<div class="wrapper">

  <header class="top-bar">
    <div>
      <div class="greeting" id="greeting">안녕하세요 👋</div>
      <div class="title">대시보드</div>
    </div>
    <div class="clock-block">
      <div id="clock">--:--:--</div>
      <div id="date-str"></div>
    </div>
  </header>

  <section class="section">
    <div class="section-label">Projects</div>
    <div class="card-grid">

      <a href="https://0oo0mu.github.io/oomu-blog/index.html" target="_blank" class="link-card c-blue">
        <div class="icon">✍️</div>
        <div class="name">Blog</div>
        <div class="desc">개발 & 언어 학습 기록</div>
        <span class="badge badge-live">Live</span>
      </a>

      <a href="https://ship-inspection-platform-khr9kzq2n-0oo0mus-projects.vercel.app/login" target="_blank" class="link-card c-green">
        <div class="icon">🔍</div>
        <div class="name">품질검사 플랫폼</div>
        <div class="desc">AI 기반 선박 부품 품질검사 웹</div>
        <span class="badge badge-live">Live</span>
      </a>

      <a href="https://odap-note-one.vercel.app/" target="_blank" class="link-card c-purple">
        <div class="icon">📝</div>
        <div class="name">오답노트</div>
        <div class="desc">실수 & 개념 정리 노트</div>
        <span class="badge badge-live">Live</span>
      </a>

      <a href="#" class="link-card c-muted" style="border-style:dashed; justify-content:center; align-items:center; flex-direction:row; gap:8px; color:var(--muted);">
        <span style="font-size:18px;">＋</span>
        <span style="font-size:13px; font-weight:600;">추가</span>
      </a>

    </div>
  </section>

  <div class="footer">made with ❤️ — dashboard v1.0</div>
</div>

<script>
  const DAYS = ['일','월','화','수','목','금','토'];
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clock').textContent = `${h}:${m}:${s}`;
    const y = now.getFullYear(), mo = now.getMonth()+1, d = now.getDate();
    document.getElementById('date-str').textContent =
      `${y}.${String(mo).padStart(2,'0')}.${String(d).padStart(2,'0')} (${DAYS[now.getDay()]})`;
    const g = document.getElementById('greeting');
    const hr = now.getHours();
    if (hr < 6)       g.textContent = '새벽에도 열심히 하는군요 🌙';
    else if (hr < 12) g.textContent = '좋은 아침이에요 ☀️';
    else if (hr < 18) g.textContent = '좋은 오후에요 🌤️';
    else              g.textContent = '수고 많았어요 🌙';
  }
  updateClock();
  setInterval(updateClock, 1000);
</script>
</body>
</html>
